server {
    listen 8765;

    root /opt/element-web;
    index index.html;

    client_max_body_size 200M;

    # Required for Element Web's Rust crypto SDK (SharedArrayBuffer)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # Allow HA iframe embedding
    add_header X-Frame-Options "" always;
    add_header Content-Security-Policy "" always;

    # Proxy Matrix API requests to Synapse
    location /_matrix/ {
        proxy_pass http://192.168.4.120:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    location /_synapse/ {
        proxy_pass http://192.168.4.120:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # Serve Element Web static files
    location / {
        try_files $uri $uri/ /index.html;
    }
}
