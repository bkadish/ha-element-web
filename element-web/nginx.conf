server {
    listen 8765;

    client_max_body_size 200M;

    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Content-Security-Policy "script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; worker-src 'self' blob:; connect-src * blob:; img-src * blob: data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; media-src * blob: data:; default-src 'self';" always;

    # Dynamic well-known response
    location = /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        return 200 '{"m.homeserver":{"base_url":"WELL_KNOWN_BASE_URL"}}';
    }

    # Proxy Matrix API requests to Synapse
    location /_matrix/ {
        proxy_pass HOMESERVER_PLACEHOLDER;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    location /_synapse/ {
        proxy_pass HOMESERVER_PLACEHOLDER;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # FluffyChat app at /app/
    location /app/ {
        alias /opt/fluffychat/;
        try_files $uri $uri/ /app/index.html;
    }

    # Landing page at root (shown in ingress iframe)
    location = / {
        root /opt/landing;
        try_files /index.html =404;
    }

    # Redirect bare /app to /app/
    location = /app {
        return 301 app/;
    }
}
