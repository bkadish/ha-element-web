server {
    listen 8765;

    root /opt/fluffychat;
    index index.html;

    client_max_body_size 200M;

    # Allow HA iframe embedding
    add_header X-Frame-Options "" always;
    add_header Content-Security-Policy "" always;

    # Dynamic well-known response using the ingress path
    # Returns base_url pointing to the same origin+path the browser used
    location = /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Frame-Options "" always;
        return 200 '{"m.homeserver":{"base_url":"WELL_KNOWN_BASE_URL"}}';
    }

    # Proxy Matrix API requests to Synapse (placeholder replaced at startup)
    location /_matrix/ {
        proxy_pass HOMESERVER_PLACEHOLDER;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    location /_synapse/ {
        proxy_pass HOMESERVER_PLACEHOLDER;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # Serve FluffyChat static files
    location / {
        try_files $uri $uri/ /index.html;
    }
}
