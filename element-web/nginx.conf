server {
    listen 8765;

    client_max_body_size 200M;

    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Content-Security-Policy "" always;

    # Proxy Matrix API requests to Synapse
    location /_matrix/ {
        proxy_pass HOMESERVER_PLACEHOLDER;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    location /_synapse/ {
        proxy_pass HOMESERVER_PLACEHOLDER;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # Serve config.json dynamically with correct homeserver URL
    location = /app/config.json {
        default_type application/json;
        return 200 '{"applicationName":"FluffyChat","defaultHomeserver":"INGRESS_URL_PLACEHOLDER","renderHtml":true,"hideUnknownEvents":true,"autoplayImages":true,"sendOnEnter":true}';
    }

    # FluffyChat app at /app/
    location /app/ {
        alias /opt/fluffychat/;
        try_files $uri $uri/ /app/index.html;
    }

    # Landing page at root (shown in ingress iframe)
    location = / {
        root /opt/landing;
        try_files /index.html =404;
    }

    # Debug endpoint - shows what headers nginx receives
    location = /debug-headers {
        default_type text/plain;
        return 200 'host: $http_host\nscheme: $scheme\nx-forwarded-proto: $http_x_forwarded_proto\nx-forwarded-host: $http_x_forwarded_host\nx-forwarded-for: $http_x_forwarded_for\nrequest-uri: $request_uri\n';
    }

    # Redirect bare /app to /app/
    location = /app {
        return 301 app/;
    }
}
